content: |-
    # Container Overlay Pattern

    Same command interface, different execution context. Eliminate conditionals from build files while supporting both host and containerized builds.

    ## The Problem

    Containerized builds for consistency across machines and CI. Common approaches have friction:

    - **Dual Makefiles**: `make -f Makefile.docker build` — people forget which to use
    - **Conditional detection**: `ifeq`/`else`/`endif` blocks everywhere — cluttered, hard to maintain
    - **Different commands**: `make build` vs `make container-build` — parallel names, duplicate docs

    ## The Solution

    Mount a different build file over the host's file inside the container.

    ```
    project/
    ├── Makefile              # Host: delegates to container
    └── Makefile.container    # Container: runs commands directly
    ```

    **Host Makefile** — orchestration:

    ```make
    DOCKER_RUN := docker run --rm \
        -v ./:/workspace \
        -v ./Makefile.container:/workspace/Makefile:ro \
        -w /workspace \
        myimage

    build:
        $(DOCKER_RUN) make build

    test:
        $(DOCKER_RUN) make test
    ```

    **Container Makefile** — execution:

    ```make
    build:
        cargo build

    test:
        cargo test
    ```

    The key: `-v ./Makefile.container:/workspace/Makefile:ro`

    This mounts `Makefile.container` **over** `Makefile` inside the container. The file swap *is* the detection mechanism.

    ## How It Works

    - **On host**: `make build` → runs Docker → mounts overlay → `make build` inside sees `Makefile.container`
    - **In container**: `make build` → runs `cargo build` directly

    No conditionals. No environment checks. No remembering which command.

    ## Separation of Concerns

    **Host file responsibilities:**
    - Container image selection
    - Volume mounts
    - Network configuration
    - Environment variables

    **Container file responsibilities:**
    - Compilation
    - Testing
    - Linting
    - Build logic

    When build logic changes, edit container file. When orchestration changes, edit host file.

    ## With just (Cleaner)

    ```just
    # justfile (host)
    _run +ARGS:
        podman run -v ./justfile.container:/workspace/justfile:ro ... just {{ARGS}}

    build:
        just _run build

    # justfile.container
    build:
        cargo build
    ```

    just advantages over Make:
    - No `.PHONY` declarations
    - Shell variables work naturally
    - Recipes take arguments
    - Better error messages
    - Cross-platform without gnumake/BSD quirks

    ## Edge Cases

    ### Already in a Container (Devcontainer)

    Optional escape hatch:

    ```make
    ifdef DEVCONTAINER
    DOCKER_RUN :=
    else
    DOCKER_RUN := docker run --rm -v ... myimage
    endif

    build:
        $(DOCKER_RUN) make build
    ```

    When `DEVCONTAINER` is set, commands run directly.

    ### Podman

    Same pattern, swap `docker` for `podman`. Add `:Z` for SELinux:

    ```make
    PODMAN_RUN := podman run --rm \
        -v ./:/workspace:Z \
        -v ./Makefile.container:/workspace/Makefile:ro \
        -w /workspace \
        myimage
    ```

    ## Tradeoffs

    **Still duplicated:**
    - Target names in both files
    - Two files to maintain

    **But:**
    - Mechanical duplication, not logical mixing
    - AI assistants handle this well — constrained pattern application
    - Easier than conditional spaghetti

    ## When to Use

    **Good fit:**
    - Polyglot projects
    - Mixed dev teams (Linux/macOS/WSL)
    - CI/CD requiring consistency

    **Skip it:**
    - Simple projects without containerization needs
    - Uniform environments with same toolchain
    - Single-target deployments
