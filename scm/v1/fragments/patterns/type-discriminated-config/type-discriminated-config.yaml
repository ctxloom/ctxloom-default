content: |-
    # Type-Discriminated Configuration

    Use discriminated unions for configuration objects with multiple variants. A discriminator field (typically `type` or `kind`) determines which configuration shape applies.

    ## Core Pattern

    Every configuration variant includes a discriminator field with a literal value. The runtime or type system uses this field to determine which variant-specific fields are valid.

    ## Benefits
    - **Type safety**: Compiler/runtime validates fields per variant
    - **Self-documenting**: Config declares its own type explicitly
    - **Extensible**: Add new variants without breaking existing ones
    - **Exhaustiveness**: Type systems can verify all variants are handled

    ## Structure

    ```
    base_config:
      type: "variant_a" | "variant_b"  # discriminator
      # common fields shared by all variants

    variant_a:
      type: "variant_a"
      # variant-specific fields

    variant_b:
      type: "variant_b"
      # different variant-specific fields
    ```

    ## Implementation Guidelines

    1. **Discriminator field**: Use `type` or `kind` as the discriminator name consistently
    2. **Literal values**: Discriminator values should be string literals, not enums when possible
    3. **Validation**: Validate discriminator first, then variant-specific fields
    4. **Unknown variants**: Fail fast on unrecognized discriminator values
    5. **Default handling**: Avoid default cases in switches—explicit variant handling catches missing cases

    ## Example (TypeScript)

    ```typescript
    type DatabaseConfig =
      | { type: "postgres"; host: string; port: number; database: string }
      | { type: "sqlite"; path: string }
      | { type: "memory" };

    function connect(config: DatabaseConfig) {
      switch (config.type) {
        case "postgres":
          return connectPostgres(config.host, config.port, config.database);
        case "sqlite":
          return connectSqlite(config.path);
        case "memory":
          return createInMemoryDb();
      }
    }
    ```

    ## Example (Go)

    ```go
    type Config struct {
        Type string `json:"type"`
    }

    type PostgresConfig struct {
        Config
        Host     string `json:"host"`
        Port     int    `json:"port"`
        Database string `json:"database"`
    }

    type SqliteConfig struct {
        Config
        Path string `json:"path"`
    }
    ```

    ## Anti-patterns

    - **Optional fields everywhere**: Don't use nullable fields for variant-specific data
    - **Boolean flags**: Don't use `isPostgres`, `isSqlite` flags—use discriminator
    - **Implicit detection**: Don't infer type from which fields are present
    - **Default switch case**: Avoid catch-all handling that hides missing variants
