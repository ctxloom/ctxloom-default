content: |-
    # UV Package Manager

    UV is a fast Python package and project manager written in Rust. Use it as the default for all Python projects.

    ## Installation

    ```bash
    # Via pipx (recommended for system-wide install)
    pipx install uv

    # Or via curl
    curl -LsSf https://astral.sh/uv/install.sh | sh
    ```

    ## Project Management

    ```bash
    # Create new project
    uv init my-project
    cd my-project

    # Add dependencies
    uv add requests pytest

    # Add dev dependencies
    uv add --dev pytest-cov ruff

    # Remove dependencies
    uv remove requests

    # Sync environment with lockfile
    uv sync
    ```

    ## Virtual Environment

    ```bash
    # Create venv (automatic with uv sync)
    uv venv

    # Activate (still needed for shell)
    source .venv/bin/activate  # Unix
    .venv\Scripts\activate     # Windows

    # Run commands in venv without activating
    uv run python script.py
    uv run pytest
    ```

    ## Lockfile

    - `uv.lock` is auto-generated and should be committed
    - Contains exact versions for reproducible builds
    - Cross-platform by default

    ## pyproject.toml Integration

    ```toml
    [project]
    name = "my-project"
    version = "0.1.0"
    requires-python = ">=3.11"
    dependencies = [
        "requests>=2.31",
    ]

    [project.optional-dependencies]
    dev = [
        "pytest>=8.0",
        "ruff>=0.4",
    ]

    [tool.uv]
    dev-dependencies = [
        "pytest>=8.0",
        "ruff>=0.4",
    ]
    ```

    ## Common Commands

    ```bash
    # Install from lockfile
    uv sync

    # Update all dependencies
    uv lock --upgrade

    # Update specific package
    uv lock --upgrade-package requests

    # Show dependency tree
    uv tree

    # Run script with dependencies
    uv run --with requests script.py

    # Build package
    uv build

    # Publish to PyPI
    uv publish
    ```

    ## Python Version Management

    ```bash
    # Install Python version
    uv python install 3.12

    # List available versions
    uv python list

    # Pin Python version for project
    uv python pin 3.12
    ```

    ## Migration from pip

    ```bash
    # Import from requirements.txt
    uv add -r requirements.txt

    # Export to requirements.txt (if needed for compatibility)
    uv export > requirements.txt
    ```

    ## Best Practices

    - Always commit `uv.lock` for reproducible builds
    - Use `uv run` instead of activating venv for one-off commands
    - Specify Python version in `requires-python` in pyproject.toml
    - Use `uv sync` in CI/CD for consistent environments
