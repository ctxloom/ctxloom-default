content: |-
    # pipx - Install Python CLI Tools

    pipx installs Python CLI applications in isolated environments, keeping them separate from project dependencies.

    ## Installation

    ```bash
    # macOS
    brew install pipx
    pipx ensurepath

    # Linux (Debian/Ubuntu)
    sudo apt install pipx
    pipx ensurepath

    # Via pip (if needed)
    python -m pip install --user pipx
    pipx ensurepath
    ```

    ## When to Use pipx vs uv

    - **pipx**: System-wide CLI tools (ruff, black, uv, pre-commit)
    - **uv**: Project dependencies and development tools

    ## Common Commands

    ```bash
    # Install a tool
    pipx install ruff
    pipx install black
    pipx install uv

    # Run without installing
    pipx run cowsay "hello"

    # Upgrade tool
    pipx upgrade ruff

    # Upgrade all tools
    pipx upgrade-all

    # List installed tools
    pipx list

    # Uninstall
    pipx uninstall ruff

    # Reinstall all (after Python upgrade)
    pipx reinstall-all
    ```

    ## Install with Extras

    ```bash
    # Install with optional dependencies
    pipx install 'black[jupyter]'
    pipx install 'ruff[all]'
    ```

    ## Inject Additional Packages

    ```bash
    # Add packages to an existing tool's environment
    pipx inject black click
    ```

    ## Recommended Tools to Install via pipx

    ```bash
    # Package management
    pipx install uv
    pipx install pip-tools

    # Code quality
    pipx install ruff
    pipx install black
    pipx install mypy
    pipx install pre-commit

    # Development utilities
    pipx install cookiecutter
    pipx install bump2version
    pipx install twine
    ```

    ## Best Practices

    - Install CLI tools globally with pipx, not pip
    - Keep pipx tools updated: `pipx upgrade-all`
    - Use `pipx run` for one-off tool usage
    - Reinstall after major Python version upgrades
