    # Testcontainers

    Library for running lightweight, throwaway containers in tests. Provides real dependencies (databases, message brokers, etc.) instead of mocks.

    ## Blurring Unit and Integration Tests

    The old unit/integration split was about *how* tests run. The better distinction is *what* they test.

    | Test Type | What It Tests | Where It Lives |
    |-----------|--------------|----------------|
    | Unit | Pure logic, no dependencies | Adjacent `.test` file |
    | BIT | Single implementation against its interface | Adjacent `.test` file (with testcontainers) |
    | Integration | Multiple components interacting | `tests/` directory |
    | E2E | Full system behavior | Separate test project |

    **Behavioral Interface Tests (BITs) with testcontainers are closer to unit tests than integration tests.** They test one thing. They're fast enough to run frequently. They should be colocated.

    The "real database" aspect doesn't change where the test belongs. It's still testing one module's behavior.

    ## When to Mock vs Test Real

    Testcontainers changed mocking strategy. Test against the real thing when cheap:

    **Use testcontainers for:**
    - Databases (PostgreSQL, MySQL, Redis, MongoDB)
    - Message brokers (Kafka, RabbitMQ)
    - Any infrastructure you control

    **Use mocks for:**
    - External services you don't control (third-party APIs)
    - Failure injection (simulate network errors)

    If you *can* test against the real thing cheaply, you should.

    ## Core Concept

    - Spin up real services as Docker/Podman containers
    - Containers start before tests, stop after
    - Automatic cleanup—no orphaned containers
    - Randomized ports prevent conflicts
    - Cross-platform: Linux, macOS, Windows (requires Docker or Podman)

    ## Go Quick Start

    ```go
    import (
        "context"
        "testing"
        "github.com/testcontainers/testcontainers-go"
        "github.com/testcontainers/testcontainers-go/wait"
    )

    func TestWithPostgres(t *testing.T) {
        ctx := context.Background()

        container, err := testcontainers.GenericContainer(ctx, testcontainers.GenericContainerRequest{
            ContainerRequest: testcontainers.ContainerRequest{
                Image:        "postgres:16-alpine",
                ExposedPorts: []string{"5432/tcp"},
                Env: map[string]string{
                    "POSTGRES_PASSWORD": "test",
                    "POSTGRES_DB":       "testdb",
                },
                WaitingFor: wait.ForLog("database system is ready to accept connections").
                    WithOccurrence(2),
            },
            Started: true,
        })
        if err != nil {
            t.Fatal(err)
        }
        defer container.Terminate(ctx)

        // Get connection details
        host, _ := container.Host(ctx)
        port, _ := container.MappedPort(ctx, "5432")
        connStr := fmt.Sprintf("postgres://postgres:test@%s:%s/testdb", host, port.Port())

        // Use the database...
    }
    ```

    ## Wait Strategies

    Ensure container is ready before tests run:

    ```go
    // Wait for log message
    wait.ForLog("Ready to accept connections")

    // Wait for HTTP endpoint
    wait.ForHTTP("/health").WithPort("8080/tcp").WithStatusCodeMatcher(
        func(status int) bool { return status == 200 },
    )

    // Wait for port to be listening
    wait.ForListeningPort("5432/tcp")

    // Wait for SQL query to succeed
    wait.ForSQL("5432/tcp", "postgres", func(host string, port nat.Port) string {
        return fmt.Sprintf("postgres://user:pass@%s:%s/db", host, port.Port())
    })

    // Combine strategies
    wait.ForAll(
        wait.ForLog("Started"),
        wait.ForHTTP("/ready"),
    )
    ```

    ## Container Lifecycle

    ```go
    // Create without starting
    container, _ := testcontainers.GenericContainer(ctx, req)

    // Start manually
    container.Start(ctx)

    // Stop (can restart)
    container.Stop(ctx, nil)

    // Terminate (remove container)
    container.Terminate(ctx)
    ```

    ## Modules (Pre-configured Containers)

    Use modules for common services—handles configuration and wait strategies:

    ```go
    import "github.com/testcontainers/testcontainers-go/modules/postgres"

    container, err := postgres.Run(ctx,
        "postgres:16-alpine",
        postgres.WithDatabase("testdb"),
        postgres.WithUsername("user"),
        postgres.WithPassword("pass"),
    )
    connStr, _ := container.ConnectionString(ctx, "sslmode=disable")
    ```

    Available modules: PostgreSQL, MySQL, Redis, MongoDB, Kafka, RabbitMQ, Elasticsearch, LocalStack, and many more.

    ## Network and Compose

    ```go
    // Create network for container communication
    network, _ := testcontainers.GenericNetwork(ctx, testcontainers.GenericNetworkRequest{
        NetworkRequest: testcontainers.NetworkRequest{Name: "test-network"},
    })

    // Attach container to network
    req := testcontainers.ContainerRequest{
        Networks: []string{"test-network"},
        NetworkAliases: map[string][]string{
            "test-network": {"myservice"},
        },
    }
    ```

    ## Files and Configuration

    ```go
    // Copy file into container
    container.CopyFileToContainer(ctx, "local.conf", "/etc/app/config.conf", 0644)

    // Mount volume
    req := testcontainers.ContainerRequest{
        Mounts: testcontainers.Mounts(
            testcontainers.BindMount("/host/path", "/container/path"),
        ),
    }

    // Use init script
    req := testcontainers.ContainerRequest{
        Files: []testcontainers.ContainerFile{
            {HostFilePath: "init.sql", ContainerFilePath: "/docker-entrypoint-initdb.d/init.sql"},
        },
    }
    ```

    ## Exec Commands

    ```go
    exitCode, reader, err := container.Exec(ctx, []string{"psql", "-U", "postgres", "-c", "SELECT 1"})
    ```

    ## Logs

    ```go
    logs, _ := container.Logs(ctx)
    defer logs.Close()
    content, _ := io.ReadAll(logs)
    ```

    ## Reusable Containers

    For faster test suites, reuse containers across tests:

    ```go
    req := testcontainers.ContainerRequest{
        Name: "reusable-postgres", // Fixed name
    }
    req = req.WithReuse(ctx)
    ```

    **Caution**: Requires manual cleanup; state persists between runs.

    ## Runtime Detection

    Testcontainers auto-detects Docker or Podman:

    ```go
    provider, _ := testcontainers.NewDockerProvider()
    info, _ := provider.Client().Info(ctx)
    // info.InitBinary == "podman" for Podman
    ```

    ## Test Categorization by Speed

    Container tests are slower than pure unit tests (~2s startup). Handle with test categories:

    ```go
    // Always runs
    func TestPureLogic(t *testing.T) { /* ... */ }

    // Runs with build tag
    //go:build testcontainers

    func TestPostgresStorage(t *testing.T) { /* ... */ }
    ```

    ```rust
    #[test]
    fn test_pure_logic() { /* runs always */ }

    #[test]
    #[cfg_attr(not(feature = "testcontainers"), ignore)]
    fn test_postgres_storage() { /* runs with --features testcontainers */ }
    ```

    Local development runs fast tests continuously. Pre-commit hooks and CI run everything.

    ## Best Practices

    1. **Use modules** when available—they handle edge cases
    2. **Always defer Terminate()** to prevent container leaks
    3. **Use wait strategies** appropriate to the service
    4. **Randomized ports** are default—never hardcode ports
    5. **Tag images** explicitly—avoid `latest` for reproducibility
    6. **Alpine images** when possible—faster pulls
    7. **Parallel tests** work fine—each gets its own container
    8. **CI/CD**: Ensure Docker/Podman available in CI environment
    9. **Colocate BITs** — Behavioral Interface Tests belong next to the implementation, not in `tests/`

    ## Troubleshooting

    - **Slow startup**: Use lighter images, check wait strategy isn't too strict
    - **Port conflicts**: Don't hardcode ports; use `MappedPort()`
    - **Container not ready**: Add appropriate wait strategy
    - **Cleanup issues**: Always `defer Terminate()`; check for panics
    - **CI failures**: Verify Docker socket access; check resource limits
