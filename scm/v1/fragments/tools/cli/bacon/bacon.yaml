content: |-
    # bacon: Background Code Checker

    Continuous code checker that runs alongside your editor, displaying errors and warnings in real-time. Designed for minimal interaction.

    ## Quick Reference

    ```bash
    # Basic usage (runs cargo check)
    bacon

    # Specific jobs
    bacon test          # Run tests
    bacon clippy        # Run Clippy linter
    bacon check-all     # Check all targets
    bacon nextest       # Use nextest runner

    # Target different project
    bacon --path ../other-project
    bacon ../other-project

    # Specify job
    bacon --job my-custom-job
    ```

    ## Installation

    ```bash
    cargo install --locked bacon

    # With optional features
    cargo install --locked bacon --features "clipboard sound"
    ```

    ## Keyboard Shortcuts

    | Key | Action |
    |-----|--------|
    | `t` | Run tests |
    | `c` | View Clippy warnings |
    | `d` | Open cargo doc in browser |
    | `f` | Restrict to failing test |
    | `esc` | Return to previous job/all tests |
    | `ctrl+j` | View all available jobs |
    | `h` | Display help |
    | `q` | Quit |

    ## Configuration Files

    ### bacon.toml (Project Settings)

    Initialize with `bacon --init`. Version control this file.

    ```toml
    default_job = "clippy"

    [jobs.clippy-all]
    command = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
    need_stdout = false

    [jobs.check-win]
    command = ["cargo", "check", "--target", "x86_64-pc-windows-gnu"]

    [jobs.check-examples]
    command = ["cargo", "check", "--examples"]
    watch = ["examples"]
    ```

    ### Job Properties

    | Property | Purpose | Default |
    |----------|---------|---------|
    | `command` | Command tokens to execute | Required |
    | `analyzer` | Output parser type | `"standard"` |
    | `allow_warnings` | Treat warnings as success | `false` |
    | `background` | Run in background | `true` |
    | `watch` | Additional directories to monitor | `src` (implicit) |
    | `on_success` | Action when job succeeds | None |
    | `ignore` | Glob patterns to exclude | None |

    ### prefs.toml (Global Preferences)

    Generate with `bacon --prefs`. Contains:
    - Personal keybindings
    - Display settings (summary, wrap, reverse)
    - Sound/notification settings
    - Color skin customization

    ## Config Loading Order

    Later files override earlier:
    1. Internal defaults
    2. Global `prefs.toml`
    3. `BACON_PREFS` env var
    4. Workspace `Cargo.toml` metadata
    5. Workspace `bacon.toml`
    6. Package-level configs
    7. `BACON_CONFIG` env var
    8. `--config-toml` argument

    ## Tips

    - Errors display before warnings; most recent last
    - Runs on file save; no manual trigger needed
    - Works with small terminal windows
    - Use `watch` field to monitor non-src directories
