  pipx:
    tags:
      - python
      - tooling
      - cli
    installation: |-
      macOS: brew install pipx && pipx ensurepath
      Linux (Debian/Ubuntu): sudo apt install pipx && pipx ensurepath
      Via pip: python -m pip install --user pipx && pipx ensurepath
    content: |-
      # pipx - Python CLI Tool Installer

      Installs Python CLI apps in isolated envs, separate from project deps.

      ## pipx vs uv

      - **pipx**: System-wide CLI tools (ruff, black, uv, pre-commit)
      - **uv**: Project deps and dev tools

      ## Commands

      ```bash
      pipx install ruff          # Install tool
      pipx run cowsay "hello"    # Run without installing
      pipx upgrade ruff          # Upgrade tool
      pipx upgrade-all           # Upgrade all
      pipx list                  # List installed
      pipx uninstall ruff        # Remove
      pipx reinstall-all         # After Python upgrade
      ```

      ## Extras & Injection

      ```bash
      pipx install 'black[jupyter]'   # With optional deps
      pipx inject black click          # Add pkgs to existing tool env
      ```

      ## Recommended Tools

      ```bash
      # Pkg mgmt: uv, pip-tools
      # Code quality: ruff, black, mypy, pre-commit
      # Dev utils: cookiecutter, bump2version, twine
      ```

      ## Best Practices

      - Use pipx (not pip) for global CLI tools
      - `pipx upgrade-all` regularly
      - `pipx run` for one-off usage
      - Reinstall after major Python upgrades
