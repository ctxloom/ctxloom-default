    content: |-
      # Behavioral Interface Test (BIT)

      Test verifying implementation fulfills interface's behavioral contract, ensuring substitutability.

      ## Definition

      BIT = test that concrete impl satisfies interface behavior (trait/protocol/abstract class).

      ```rust
      trait EventStore {
          fn append(&self, stream: &str, events: Vec<Event>) -> Result<()>;
          fn read(&self, stream: &str) -> Result<Vec<Event>>;
      }

      #[test]
      fn bit_event_store_persists_events() {
          let store = PostgresEventStore::new(connect_to(&container));
          store.append("order-123", vec![event]).unwrap();
          assert_eq!(store.read("order-123").unwrap().len(), 1);
      }
      ```

      Tests single module against interface—not integration test just because it uses DB.

      ## BITs ≠ Integration Tests

      | Type | Tests | Location |
      |------|-------|----------|
      | Unit | Pure logic | Adjacent `.test` |
      | BIT | Single impl vs interface | Adjacent `.test` |
      | Integration | Multiple components | `tests/` |
      | E2E | Full system | Separate project |

      BITs w/testcontainers ≈ unit tests: test one thing, fast enough for frequent runs, colocated.

      ## Colocation

      ```
      src/storage/
      ├── postgres.rs
      ├── postgres.bit.rs
      ├── sqlite.rs
      └── sqlite.bit.rs
      ```

      Real DB doesn't change test location—still tests one module.

      ## Multiple Implementations

      Shared BIT suite ensures Liskov Substitution:

      ```rust
      fn event_store_bits(store: impl EventStore) {
          store.append("stream-1", vec![event]).unwrap();
          assert_eq!(store.read("stream-1").unwrap().len(), 1);
          assert!(store.read("unknown").unwrap().is_empty());
      }

      #[test] fn postgres_passes() { event_store_bits(PostgresEventStore::new(/**/)); }
      #[test] fn in_memory_passes() { event_store_bits(InMemoryEventStore::new()); }
      ```

      ## When Real Infra Is Cheap

      Testcontainers collapsed unit/integration cost gap.

      **Use real:** DB impls, message brokers, caches
      **Use mocks:** External services, failure injection, rate-limited APIs

      If cheap to test real thing → do it.

      ## BIT vs CDC

      | | BIT | CDC (Pact) |
      |-|-----|------------|
      | Scope | Single codebase | Distributed |
      | Tests | Impl vs interface | Service vs service |
      | Purpose | Substitutability | API compat |

      ## Speed/Categorization

      ```rust
      #[test]
      #[cfg_attr(not(feature = "testcontainers"), ignore)]
      fn bit_postgres_storage() { /**/ }
      ```

      - Local: fast tests continuously
      - Pre-commit: all incl BITs
      - CI: everything

      ## Name

      **B**ehavioral **I**nterface **T**est. Pun: "BIT caught regression" / "BIT me on edge case"
