      # Behavioral Interface Test (BIT)

      A test that verifies an implementation correctly fulfills its interface's behavioral contract. BITs ensure implementations are substitutable.

      ## What Is a BIT?

      A Behavioral Interface Test verifies that a concrete implementation satisfies the behavioral expectations defined by an interface (trait, protocol, abstract class).

      ```rust
      // The interface (behavioral contract)
      trait EventStore {
          fn append(&self, stream: &str, events: Vec<Event>) -> Result<()>;
          fn read(&self, stream: &str) -> Result<Vec<Event>>;
      }

      // BIT — verifies PostgresEventStore fulfills EventStore behavior
      #[test]
      fn bit_event_store_persists_events() {
          let container = PostgresContainer::new();
          let store = PostgresEventStore::new(connect_to(&container));

          store.append("order-123", vec![event]).unwrap();
          let events = store.read("order-123").unwrap();

          assert_eq!(events.len(), 1);
      }
      ```

      This tests one module's behavior against its interface. It's not an "integration test" just because it touches a database.

      ## BITs Are Not Integration Tests

      The old unit/integration distinction was about *how* tests run. The better distinction is *what* they test:

      | Test Type | What It Tests | Where It Lives |
      |-----------|--------------|----------------|
      | Unit | Pure logic, no dependencies | Adjacent `.test` file |
      | BIT | Single implementation against its interface | Adjacent `.test` file |
      | Integration | Multiple components interacting | `tests/` directory |
      | E2E | Full system behavior | Separate test project |

      BITs with testcontainers are closer to unit tests than integration tests:
      - They test one thing
      - They're fast enough to run frequently
      - They should be colocated with the implementation

      ## Colocate BITs

      Tests belong near the code they test:

      ```
      src/
      ├── storage/
      │   ├── postgres.rs              # PostgresEventStore implementation
      │   ├── postgres.bit.rs          # BITs against real Postgres
      │   ├── sqlite.rs
      │   └── sqlite.bit.rs
      ```

      The "real database" aspect doesn't change where the test belongs. It's still testing one module.

      ## The Same Interface, Multiple Implementations

      When you have multiple implementations of an interface, BITs ensure they're interchangeable (Liskov Substitution):

      ```rust
      // Shared BIT suite for any EventStore implementation
      fn event_store_bits(store: impl EventStore) {
          // BIT 1: Can append and read events
          store.append("stream-1", vec![event]).unwrap();
          assert_eq!(store.read("stream-1").unwrap().len(), 1);

          // BIT 2: Returns empty for unknown stream
          assert!(store.read("unknown").unwrap().is_empty());

          // BIT 3: Appends are ordered
          store.append("stream-1", vec![event2]).unwrap();
          let events = store.read("stream-1").unwrap();
          assert_eq!(events[0], event);
          assert_eq!(events[1], event2);
      }

      #[test]
      fn postgres_passes_event_store_bits() {
          let store = PostgresEventStore::new(/*...*/);
          event_store_bits(store);
      }

      #[test]
      fn in_memory_passes_event_store_bits() {
          let store = InMemoryEventStore::new();
          event_store_bits(store);
      }
      ```

      ## When Real Infrastructure Is Cheap

      Testcontainers collapsed the cost difference between "unit" and "integration" tests. When you can spin up real Postgres in 2 seconds:

      **Use real infrastructure for:**
      - Database implementations (repositories, stores)
      - Message broker consumers/producers
      - Cache implementations

      **Use mocks for:**
      - External services you don't control
      - Failure injection
      - Rate-limited APIs

      If you *can* test against the real thing cheaply, you should.

      ## BIT vs Consumer-Driven Contracts (CDC)

      Different concepts:

      | Aspect | BIT | CDC (Pact, etc.) |
      |--------|-----|------------------|
      | Scope | Single codebase | Distributed systems |
      | Tests | Implementation vs interface | Service vs service |
      | Location | Colocated with impl | Shared broker |
      | Purpose | Substitutability | API compatibility |

      BITs verify implementation correctness within a codebase. CDC verifies service-to-service contracts.

      ## Test Speed and Categorization

      Container-backed BITs are slower (~2s startup). Categorize them:

      ```rust
      #[test]
      fn test_pure_logic() { /* runs always */ }

      #[test]
      #[cfg_attr(not(feature = "testcontainers"), ignore)]
      fn bit_postgres_storage() { /* runs with --features testcontainers */ }
      ```

      - Local dev: fast tests continuously
      - Pre-commit: all tests including BITs
      - CI: everything

      The slower tests are still colocated; they're just conditionally executed.

      ## Why "BIT"?

      - **Behavioral**: Tests behavior, not just types
      - **Interface**: Tests against the interface contract
      - **Test**: It's a test
      - **Pun**: "The BIT caught a regression" / "BIT me on that edge case"

      Prior art: The concept aligns with "Behavioral Contract Testing" ([jdecool.fr](https://www.jdecool.fr/blog/2025/02/16/tester-les-implementations-d-une-interface-avec-le-behavioral-contract-testing.html)) and the Abstract Test pattern ([testingpatterns.net](https://testingpatterns.net/patterns/abstract_test/)).
