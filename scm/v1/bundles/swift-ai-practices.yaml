    content: |-
      # Swift Rules

      ## CRITICAL: Never Modify .pbxproj

      ```
      NEVER let AI modify .xcodeproj/project.pbxproj files.
      ```

      1. Create files with AI
      2. Add to Xcode manually (File > Add Files)
      3. Let Xcode manage project file

      One corrupted .pbxproj wastes hours.

      ## Swift 6 Concurrency

      ### async/await for All Async
      ```swift
      // GOOD
      func fetchUser(id: String) async throws -> User {
          let (data, _) = try await URLSession.shared.data(from: url)
          return try JSONDecoder().decode(User.self, from: data)
      }

      // BAD - Completion handlers
      func fetchUser(id: String, completion: @escaping (Result<User, Error>) -> Void)
      ```

      ### Sendable Types
      ```swift
      struct UserData: Sendable {
          let id: String
          let name: String
      }
      ```

      ## SwiftUI

      ### Navigation
      ```swift
      // GOOD - NavigationStack (iOS 16+)
      NavigationStack {
          List(items) { item in
              NavigationLink(value: item) { ItemRow(item: item) }
          }
          .navigationDestination(for: Item.self) { ItemDetail(item: $0) }
      }

      // BAD - NavigationView (deprecated)
      ```

      ### State Management
      ```swift
      // GOOD - @Observable (iOS 17+)
      @Observable class UserViewModel {
          var user: User?
      }

      // OUTDATED
      class UserViewModel: ObservableObject {
          @Published var user: User?
      }
      ```

      ### State Placement
      | Decorator | Use |
      |-----------|-----|
      | `@State` | Local view state only |
      | `@Environment` | Dependency injection |
      | `@Bindable` | Bindings to @Observable |
      | `@Query` | SwiftData queries |

      ## Value Types

      Prefer structs. Use class only for identity, inheritance, or deinit.

      ## Error Handling

      ```swift
      guard let user = user else { throw UserError.notFound }
      guard user.isValid else { throw UserError.invalidData }
      ```

      ## Testing (Xcode 16+)

      ```swift
      import Testing

      @Test func userCreation() {
          let user = User(name: "Test")
          #expect(user.name == "Test")
      }
      ```
