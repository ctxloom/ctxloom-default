    content: |-
      # asdf Version Manager

      asdf manages multiple runtime versions (Node, Python, Go, Ruby, etc.) with a single CLI.

      ## Installation

      ```bash
      # macOS
      brew install asdf

      # Linux (git clone)
      git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
      ```

      Add to shell config:
      ```bash
      # bash (~/.bashrc)
      . "$HOME/.asdf/asdf.sh"
      . "$HOME/.asdf/completions/asdf.bash"

      # zsh (~/.zshrc)
      . "$HOME/.asdf/asdf.sh"
      fpath=(${ASDF_DIR}/completions $fpath)
      autoload -Uz compinit && compinit
      ```

      ## Plugin Management

      ```bash
      # Add plugins
      asdf plugin add nodejs
      asdf plugin add python
      asdf plugin add golang
      asdf plugin add rust
      asdf plugin add java

      # List available plugins
      asdf plugin list all

      # List installed plugins
      asdf plugin list

      # Update plugins
      asdf plugin update --all
      ```

      ## Version Management

      ```bash
      # List available versions
      asdf list all nodejs
      asdf list all python

      # Install specific version
      asdf install nodejs 20.11.0
      asdf install python 3.12.1

      # Install latest stable
      asdf install nodejs latest
      asdf install python latest

      # List installed versions
      asdf list nodejs
      asdf list python

      # Uninstall version
      asdf uninstall nodejs 18.0.0
      ```

      ## Setting Versions

      ```bash
      # Set global default (~/.tool-versions)
      asdf global nodejs 20.11.0
      asdf global python 3.12.1

      # Set local project version (.tool-versions in current dir)
      asdf local nodejs 20.11.0
      asdf local python 3.12.1

      # Set for current shell only
      asdf shell nodejs 20.11.0

      # Show current version
      asdf current nodejs
      asdf current  # all tools
      ```

      ## .tool-versions File

      Commit `.tool-versions` to version control for reproducible environments:

      ```
      nodejs 20.11.0
      python 3.12.1
      golang 1.22.0
      ```

      Install all versions from file:
      ```bash
      asdf install
      ```

      ## Common Commands

      ```bash
      # Show where a command comes from
      asdf which python

      # Reshim after installing global packages
      asdf reshim nodejs
      asdf reshim python

      # Show info for debugging
      asdf info

      # Update asdf itself
      asdf update
      ```

      ## Legacy Version Files

      asdf can read existing version files:
      ```bash
      # Enable in ~/.asdfrc
      legacy_version_file = yes
      ```

      Supports: `.nvmrc`, `.node-version`, `.python-version`, `.ruby-version`, etc.

      ## Best Practices

      - Always commit `.tool-versions` to repository
      - Run `asdf install` after cloning a project
      - Use `asdf reshim` after installing global packages (pip, npm -g)
      - Pin exact versions, not `latest`, in `.tool-versions`
      - Update plugins regularly: `asdf plugin update --all`
