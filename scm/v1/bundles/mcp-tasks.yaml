version: 1.0.0
tags:
    - mcp
    - workflow
    - tasks
    - productivity
author: scm
description: MCP Tasks server for persistent task management across sessions
notes: |
    This bundle provides the mcp-tasks MCP server along with usage context.
    Tasks are stored in .tasks/todos.md and persist across sessions.
    The server provides tools for managing tasks, reminders, and notes.
installation: |
    ## mcp-tasks Installation

    Requires Node.js 18+.

    Option 1 - Run via npx (no install needed):
    ```bash
    npx -y mcp-tasks
    ```

    Option 2 - Global install:
    ```bash
    npm install -g mcp-tasks
    ```

    The MCP server will be auto-registered. Tasks are stored in `.tasks/todos.md`.
mcp:
    mcp-tasks:
        command: npx
        args:
            - -y
            - mcp-tasks
        note: Persistent task management with markdown storage
fragments:
    usage:
        tags:
            - mcp
            - tasks
            - workflow
        content: |
            # MCP Tasks

            Use mcp-tasks for persistent task management across sessions.

            ## Setup

            - Store tasks in `.tasks/todos.md`
            - Call `tasks_setup` once per conversation with the source path
            - Use the workspace parameter to specify the project directory
            - Note that the user may refer to this plugin as "tasks" or "todo" in the conversation

            ## Task Statuses

            - **In Progress**: Current work item (limit to one at a time)
            - **To Do**: Upcoming tasks
            - **Backlog**: Lower priority items
            - **Done**: Completed tasks
            - **Reminders**: Persistent instructions for the AI
            - **Notes**: Non-actionable reference information

            ## Best Practices

            - Keep mcp-tasks synchronized with TodoWrite
            - Use `tasks_add` for batch additions
            - Use `tasks_update` for bulk status changes
            - Call `tasks_search` to find specific tasks by status or text
            - Avoid redundant `tasks_summary` calls after add/update operations
