prompts:
    setup-tasks:
        description: Initialize task tracking for a project
        tags:
            - tasks
            - workflow
        content: |
            Set up task management for this project:
            1. Call tasks_setup with the current workspace
            2. Check for existing tasks in .tasks/todos.md
            3. Summarize any existing tasks
            4. Ask what tasks I should track
