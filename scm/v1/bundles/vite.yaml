    content: |-
      # Vite

      Modern build tool for web projects. Fast dev server with HMR, optimized production builds.

      ## Project Structure

      ```
      src/
        main.tsx          # Entry point
        App.tsx           # Root component
        components/       # UI components
        hooks/            # Custom hooks
        utils/            # Utilities
      public/             # Static assets (copied as-is)
      index.html          # HTML entry (in root, not public/)
      vite.config.ts      # Vite configuration
      ```

      ## Config (vite.config.ts)

      ```typescript
      import { defineConfig } from 'vite'
      import react from '@vitejs/plugin-react'

      export default defineConfig({
        plugins: [react()],
        build: {
          rollupOptions: {
            output: {
              // Content-hashed filenames for caching
              entryFileNames: 'assets/[name]-[hash].js',
              chunkFileNames: 'assets/[name]-[hash].js',
              assetFileNames: 'assets/[name]-[hash].[ext]',
            },
          },
        },
        server: {
          // Disable caching in dev
          headers: { 'Cache-Control': 'no-store' },
        },
      })
      ```

      ## Commands

      | Command | Purpose |
      |---------|---------|
      | `pnpm dev` | Dev server with HMR |
      | `pnpm build` | Production build (runs tsc first) |
      | `pnpm preview` | Preview production build locally |

      ## TypeScript Integration

      Use project references for separation:
      - `tsconfig.json` - References only
      - `tsconfig.app.json` - App code (src/)
      - `tsconfig.node.json` - Node code (vite.config.ts)

      Key tsconfig settings for Vite:
      ```json
      {
        "compilerOptions": {
          "moduleResolution": "bundler",
          "allowImportingTsExtensions": true,
          "verbatimModuleSyntax": true,
          "noEmit": true
        }
      }
      ```

      ## Environment Variables

      - `.env` files: `.env`, `.env.local`, `.env.[mode]`
      - Prefix with `VITE_` to expose to client
      - Access via `import.meta.env.VITE_*`
      - Never put secrets in `VITE_` vars (exposed to client)

      ## Path Aliases

      ```typescript
      // vite.config.ts
      resolve: {
        alias: {
          '@': path.resolve(__dirname, './src'),
        },
      }
      ```

      Also add to tsconfig.app.json:
      ```json
      "paths": { "@/*": ["./src/*"] }
      ```

      ## Best Practices

      - Use `import.meta.env.DEV` / `PROD` for env checks
      - Lazy load routes with `React.lazy()`
      - Use `vite-plugin-checker` for type checking in dev
      - Configure `build.target` for browser support
