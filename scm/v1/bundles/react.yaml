    content: |-
      # React (TypeScript)

      ## Component Structure

      ```
      components/
        Button/
          Button.tsx        # Component
          Button.test.tsx   # Tests co-located
          index.ts          # Re-export
      ```

      ## Function Components Only

      ```typescript
      // Named export, explicit return type
      export function UserCard({ user }: UserCardProps): React.ReactElement {
        return <div>{user.name}</div>
      }

      // Props interface above component
      interface UserCardProps {
        user: User
        onSelect?: (user: User) => void
      }
      ```

      ## Hooks

      ### useState
      ```typescript
      // Type inferred from initial value
      const [count, setCount] = useState(0)

      // Explicit type when initial is null/undefined
      const [user, setUser] = useState<User | null>(null)
      ```

      ### useEffect
      ```typescript
      useEffect(() => {
        const controller = new AbortController()
        fetchData(controller.signal)
        return () => controller.abort()  // Always cleanup
      }, [dependency])  // Exhaustive deps
      ```

      ### Custom Hooks
      - Prefix with `use`
      - Extract reusable stateful logic
      - Return tuple or object, not JSX

      ## Event Handlers

      ```typescript
      // Inline for simple cases
      <button onClick={() => setCount(c => c + 1)}>

      // Named handler with proper types
      function handleSubmit(event: React.FormEvent<HTMLFormElement>): void {
        event.preventDefault()
        // ...
      }
      ```

      ## Conditional Rendering

      ```typescript
      // Short-circuit (preferred for simple cases)
      {isVisible && <Modal />}

      // Ternary for either/or
      {isLoading ? <Spinner /> : <Content />}

      // Early return for complex conditions
      if (!data) return <Loading />
      return <DataView data={data} />
      ```

      ## Lists

      ```typescript
      // Key must be stable, unique identifier - never index
      {items.map(item => (
        <ListItem key={item.id} item={item} />
      ))}
      ```

      ## Children

      ```typescript
      interface LayoutProps {
        children: React.ReactNode  // Most permissive
      }

      // Or for single element
      interface WrapperProps {
        children: React.ReactElement
      }
      ```

      ## Refs

      ```typescript
      const inputRef = useRef<HTMLInputElement>(null)

      // Check before use
      if (inputRef.current) {
        inputRef.current.focus()
      }
      ```

      ## Context

      ```typescript
      // Create with explicit type
      const ThemeContext = createContext<Theme | null>(null)

      // Custom hook for type-safe access
      export function useTheme(): Theme {
        const context = useContext(ThemeContext)
        if (!context) throw new Error('useTheme must be within ThemeProvider')
        return context
      }
      ```

      ## Performance

      - `useMemo` for expensive computations
      - `useCallback` for stable function references
      - `React.memo` for pure components (use sparingly)
      - Avoid inline object/array literals in props
      - Profile before optimizing

      ## Anti-Patterns

      - No `any` in component props
      - No `useEffect` for derived state (compute inline)
      - No state for values derivable from props
      - No index as key (unless static list)
      - No direct DOM manipulation (use refs)
