      # ast-grep: Structural Code Search & Replace

      AST-aware tool for searching, linting, and rewriting code. Uses tree-sitter to parse code into syntax trees, matching structure rather than text.

      ## Quick Reference

      ```bash
      # Search
      ast-grep -p 'console.log($ARG)' --lang ts

      # Replace (preview)
      ast-grep -p 'console.log($ARG)' -r 'logger.debug($ARG)' --lang ts

      # Replace (apply)
      ast-grep -p 'console.log($ARG)' -r 'logger.debug($ARG)' --lang ts -U

      # Interactive review
      ast-grep -p 'PATTERN' -r 'REPLACEMENT' -i

      # Run YAML rules
      ast-grep scan --rule rules/my-rule.yaml

      # Debug: see parsed AST
      ast-grep run -p 'PATTERN' --debug-query ast
      ```

      ## Meta-variable Syntax

      | Syntax | Matches | Example |
      |--------|---------|---------|
      | `$VAR` | Single named AST node | `console.log($ARG)` |
      | `$$$ARGS` | Zero or more nodes | `func($$$ARGS)` |
      | `$_` | Wildcard (no capture) | `if ($_) { $$$_ }` |
      | `$$VAR` | Unnamed nodes (punctuation) | `$$OP` matches `+` |

      **Naming rules:** `$` + uppercase letters/underscores/digits (1-9). Invalid: `$lowercase`, `$123`, `$KEBAB-CASE`.

      **Capture behavior:**
      - Same name = must match identical code: `$A == $A` matches `x == x`, not `x == y`
      - Prefix with `_` to suppress capture: `$_FUNC($_ARG)` matches any call with one arg
      - Multi-node `$$$` is lazy—stops at first match of next pattern element

      ## Pattern Gotchas

      **Pattern must be valid, parseable code.** Fragments won't work directly.

      ```yaml
      # WRONG: "key": $VAL is not valid JSON
      pattern: '"key": $VAL'

      # RIGHT: Use context + selector
      pattern:
        context: '{"key": $VAL}'
        selector: pair
      ```

      **`kind` and `pattern` don't combine.** They're independent atomic rules. Use `context`/`selector` instead:

      ```yaml
      # WRONG: trying to match field_definition with pattern
      rule:
        kind: field_definition
        pattern: $NAME = $VAL

      # RIGHT: use pattern object
      rule:
        pattern:
          context: 'class A { $NAME = $VAL }'
          selector: field_definition
      ```

      ## Rule Types

      ### Atomic (match single node)

      ```yaml
      pattern: 'console.log($ARG)'           # Code structure
      kind: if_statement                      # AST node type
      regex: '^use[A-Z]'                      # Node text (Rust regex)
      nthChild: 1                             # Position (1-based)
      ```

      ### Relational (node relationships)

      ```yaml
      inside:                                 # Target within ancestor
        kind: function_declaration
        stopBy: end                           # Search to end (default: neighbor)

      has:                                    # Target contains descendant
        pattern: 'return $X'
        field: body                           # Match specific field

      precedes: { pattern: ... }              # Target before sibling
      follows: { pattern: ... }               # Target after sibling
      ```

      ### Composite (boolean logic)

      ```yaml
      all: [rule1, rule2]                     # AND - all must match
      any: [rule1, rule2]                     # OR - one must match
      not: { pattern: ... }                   # Negation
      matches: utility-rule-id                # Delegate to utility rule
      ```

      **Order matters in `all`:** First rule captures meta-variables; later rules use those bindings.

      ## YAML Rule Structure

      ```yaml
      id: no-console                          # Required: unique ID
      language: typescript                    # Required: target language
      rule:                                   # Required: matching rule
        pattern: 'console.log($$$ARGS)'
      constraints:                            # Optional: filter meta-vars
        ARGS:
          regex: '^(?!.*debug).*$'            # Exclude debug messages
      fix: 'logger.info($$$ARGS)'             # Optional: auto-fix
      transform:                              # Optional: modify meta-vars
        UPPER_ARG:
          convert:
            source: $ARG
            toCase: upperCase
      severity: warning                       # hint/info/warning/error/off
      message: 'Use logger instead of console'
      files: ['src/**/*.ts']                  # Include patterns
      ignores: ['**/*.test.ts']               # Exclude patterns
      ```

      ## Transforms

      ```yaml
      transform:
        # Substring extraction (Python-like slicing)
        TRIMMED:
          substring: { source: $VAR, startChar: 1, endChar: -1 }

        # Regex replace
        CLEANED:
          replace: { source: $VAR, replace: '^_+', by: '' }

        # Case conversion
        SNAKE:
          convert: { source: $VAR, toCase: snakeCase }
      ```

      Cases: `lowerCase`, `upperCase`, `capitalize`, `camelCase`, `snakeCase`, `kebabCase`, `pascalCase`

      ## Fix with Range Expansion

      Remove property including trailing comma:

      ```yaml
      fix:
        template: ''
        expandEnd: { regex: ',\s*' }
      ```

      ## Project Setup

      ```bash
      ast-grep new              # Initialize project
      ast-grep new rule         # Create new rule
      ```

      Creates:
      ```
      sgconfig.yml              # Project config
      rules/                    # Rule definitions
      rule-tests/               # Test cases
      utils/                    # Shared utility rules
      ```

      **sgconfig.yml:**
      ```yaml
      ruleDirs:
        - rules
      testConfigs:
        - testDir: rule-tests
      utilDirs:
        - utils
      ```

      ## Testing Rules

      ```yaml
      # rule-tests/no-console-test.yml
      id: no-console
      valid:
        - 'logger.info("ok")'
        - 'debug && console.log("debug")'
      invalid:
        - 'console.log("error")'
        - 'console.warn("warning")'
      ```

      ```bash
      ast-grep test --skip-snapshot-tests    # Validate rules
      ast-grep test -U                       # Update snapshots
      ```

      ## Debugging

      1. **Test in playground:** https://ast-grep.github.io/playground.html
      2. **Inspect AST:** `ast-grep run -p 'PATTERN' --debug-query ast`
      3. **Check node kinds:** Use playground to see exact AST structure
      4. **UTF encoding:** CLI uses UTF-8, playground uses UTF-16

      ## Limitations

      ast-grep does NOT support:
      - Scope/type analysis
      - Control/data flow analysis
      - Finding undefined/unused variables
      - Taint analysis or constant propagation

      These require semantic analysis beyond AST matching.

      ## Common Patterns

      ```bash
      # Rename function
      ast-grep -p 'oldFunc($$$A)' -r 'newFunc($$$A)' --lang ts -U

      # Update import path
      ast-grep -p 'from "old/path"' -r 'from "new/path"' --lang ts -U

      # Remove argument
      ast-grep -p 'fn($A, $B, true)' -r 'fn($A, $B)' --lang ts -U

      # Wrap with try-catch (complex—use YAML rule)
      ```

      ## Workflow

      1. Test pattern in playground or with `--debug-query`
      2. Run without `-U` to preview matches
      3. Use `-i` for interactive review
      4. Apply with `-U` (--update-all)
      5. Run tests to verify
      6. Commit changes
