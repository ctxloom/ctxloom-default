    style:
        tags:
            - golang
            - style
        content: |
            # Go Code Style

            ## Formatting
            - Use gofmt for all code
            - Follow Effective Go guidelines
            - Keep functions focused and small (<50 lines preferred)

            ## Naming
            - Use MixedCaps, not underscores
            - Exported names: descriptive and complete
            - Interfaces: method-based (Reader, Writer, Closer)
            - Receivers: short, 1-2 letters, consistent

            ## Documentation
            - Document all exported identifiers
            - Start with the name being documented
            - Complete sentences ending with period

            ## Error Handling
            - Return errors, don't panic
            - Wrap errors with context: fmt.Errorf("op: %w", err)
            - Check errors immediately after call
            - Use sentinel errors sparingly
