    testing:
        tags:
            - golang
            - testing
            - tdd
        content: |
            # Go Testing Practices

            ## Structure
            - Table-driven tests for multiple cases
            - Use testify/assert for complex assertions
            - Subtests with t.Run for organization

            ## Naming
            - Test functions: TestFunctionName_Scenario_ExpectedResult
            - Use descriptive subtest names

            ## Patterns
            ```go
            func TestAdd_TwoPositiveNumbers_ReturnsSum(t *testing.T) {
                tests := []struct {
                    name     string
                    a, b     int
                    expected int
                }{
                    {"basic", 1, 2, 3},
                    {"zero", 0, 0, 0},
                }
                for _, tt := range tests {
                    t.Run(tt.name, func(t *testing.T) {
                        got := Add(tt.a, tt.b)
                        assert.Equal(t, tt.expected, got)
                    })
                }
            }
            ```

            ## Coverage
            - Aim for 80%+ coverage on critical paths
            - Test error cases explicitly
            - Use mocks for external dependencies
