  config-validation:
    tags:
      - configuration
      - validation
      - fail-fast
    content: |-
      # Config Validation

      Fail fast on invalid configuration. Validate everything at startup.

      ## Principles

      - Validate all config before app starts
      - Fail immediately with clear errors
      - Never silently use defaults for missing required values
      - Type-check, range-check, format-check

      ## What to Validate

      - **Required fields** - error if missing
      - **Types** - string, int, bool, duration, URL
      - **Ranges** - port 1-65535, timeout > 0
      - **Formats** - valid URL, valid email, valid path
      - **Relationships** - max > min, end > start
      - **Existence** - file paths exist, directories writable

      ## Implementation

      ```
      1. Load all config sources
      2. Merge according to precedence
      3. Validate entire config object
      4. Fail with ALL errors, not just first
      5. Start app only if validation passes
      ```

      ## Error Messages

      Good: `CONFIG ERROR: DATABASE_URL is required but not set`
      Good: `CONFIG ERROR: PORT must be 1-65535, got 70000`
      Bad: `invalid config`
      Bad: `null pointer exception`

      ## Rules

      - Collect all errors, report together
      - Include field name, expected format, actual value
      - Never log sensitive values in errors
      - Validate in one place, not scattered through code
      - Make invalid states unrepresentable via types

      ## Anti-patterns

      - Validating config on first use (fails at runtime)
      - Silent defaults for missing values
      - Partial validation (some fields checked, others not)
      - Generic error messages
      - Logging secrets in validation errors

  layered-config:
    tags:
      - configuration
      - precedence
      - environments
    content: |-
      # Layered Configuration

      Config from multiple sources with clear precedence.

      ## Precedence (lowest to highest)

      1. **Defaults** - hardcoded sensible defaults
      2. **Config file** - app.yaml, config.json
      3. **Environment variables** - 12-factor style
      4. **CLI arguments** - runtime overrides

      Each layer overrides the previous. Higher = wins.

      ## Why This Order

      - Defaults: app works out of box
      - File: environment-specific settings
      - Env vars: deployment/container config
      - CLI: debugging, one-off overrides

      ## Implementation Pattern

      ```
      config = {}
      config.merge(defaults)
      config.merge(load_file("config.yaml"))
      config.merge(load_env_vars())
      config.merge(parse_cli_args())
      validate(config)
      ```

      ## Naming Conventions

      | Layer | Example |
      |-------|---------|
      | Config file | `database.host: localhost` |
      | Env var | `DATABASE_HOST=localhost` |
      | CLI | `--database-host localhost` |

      ## Rules

      - Document precedence clearly
      - Same config = same name across layers (with format conversion)
      - Env vars: SCREAMING_SNAKE_CASE, prefixed (APP_DATABASE_HOST)
      - CLI args: kebab-case (--database-host)
      - File: nested structure (database.host)
      - Log final merged config at startup (excluding secrets)

      ## Partial Overrides

      Allow overriding individual fields, not entire sections:
      ```yaml
      # File sets defaults
      database:
        host: localhost
        port: 5432

      # Env overrides just host
      DATABASE_HOST=production-db
      # Result: host=production-db, port=5432
      ```

      ## Anti-patterns

      - Undocumented precedence
      - Different names for same config in different layers
      - All-or-nothing section overrides
      - No way to see final merged config
