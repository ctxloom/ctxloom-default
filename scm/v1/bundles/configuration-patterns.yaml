  type-discriminated-config:
    tags:
      - configuration
      - patterns
      - type-safety
      - polymorphism
    content: |-
      # Type-Discriminated Configuration

      Discriminated unions for config objects w/ multiple variants. A discriminator field (`type`/`kind`) determines which config shape applies.

      ## Core Pattern
      Each variant has a discriminator field w/ literal value. Runtime/type system uses it to determine valid variant-specific fields.

      ## Benefits
      - Type safety: validates fields per variant
      - Self-documenting: config declares its type
      - Extensible: new variants don't break existing
      - Exhaustiveness: type systems verify all variants handled

      ## Structure
      ```
      base_config:
        type: "variant_a" | "variant_b"  # discriminator
        # common fields

      variant_a:
        type: "variant_a"
        # variant-specific fields

      variant_b:
        type: "variant_b"
        # different fields
      ```

      ## Guidelines
      1. Use `type`/`kind` consistently as discriminator name
      2. Prefer string literals over enums for discriminator values
      3. Validate discriminator first, then variant fields
      4. Fail fast on unrecognized discriminator values
      5. Avoid default switch cases—explicit handling catches missing variants

      ## TypeScript Example
      ```typescript
      type DatabaseConfig =
        | { type: "postgres"; host: string; port: number; database: string }
        | { type: "sqlite"; path: string }
        | { type: "memory" };

      function connect(config: DatabaseConfig) {
        switch (config.type) {
          case "postgres": return connectPostgres(config.host, config.port, config.database);
          case "sqlite": return connectSqlite(config.path);
          case "memory": return createInMemoryDb();
        }
      }
      ```

      ## Go Example
      ```go
      type Config struct {
          Type string `json:"type"`
      }
      type PostgresConfig struct {
          Config
          Host     string `json:"host"`
          Port     int    `json:"port"`
          Database string `json:"database"`
      }
      type SqliteConfig struct {
          Config
          Path string `json:"path"`
      }
      ```

      ## Anti-patterns
      - Optional fields everywhere instead of variant-specific data
      - Boolean flags (`isPostgres`) instead of discriminator
      - Inferring type from present fields
      - Catch-all default cases hiding missing variants
