    performance:
        tags:
            - review
            - performance
            - algorithms
        content: |-
            # Performance Review

            ## Complexity
            - Time/space Big-O?
            - Hidden O(n) in loops?
            - Better algorithm available?

            ## Data Structures
            - Right structure for access pattern?
            - HashMap vs TreeMap (ordering needed?)
            - Array vs linked list (random vs sequential?)
            - Set vs list (duplicates?)
            - Heap/priority queue fit?

            ## Memory
            - Minimize allocations in hot paths
            - Avoid unnecessary copies
            - Stream vs load all
            - Pass large objects by ref

            ## Caching
            - Cache expensive repeated computations
            - Correct invalidation?
            - Bounded cache sizes

            ## I/O & Network
            - Batch I/O ops
            - Paginate large datasets
            - Minimize round-trips
            - Use async where appropriate

            ## Loops
            - Hoist invariants
            - Early termination
            - Parallelizable?

            ## Profiling
            - Actually profiled?
            - Real bottlenecks identified?
            - Micro-opts justified by measurement?
            - Avoid premature optimization
        content_hash: sha256:70a6a9f3432df34a15f3f417f17b4cc643942be76f87df32447939cf8f7c1ff2
