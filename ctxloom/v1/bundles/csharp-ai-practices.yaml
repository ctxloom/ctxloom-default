    content: |-
      # C# Rules

      ## Nullable Reference Types

      Enable in project:
      ```xml
      <Nullable>enable</Nullable>
      ```

      ```csharp
      // Explicit nullability
      public User? FindUser(string id);

      // Null checks
      if (user is not null) { ... }
      user?.Profile?.Avatar
      var name = user?.Name ?? "Unknown";
      ```

      ## Records

      ```csharp
      // GOOD - Immutable data
      public record User(string Id, string Name, string Email);

      // With-expressions for copies
      var updated = user with { Name = "New Name" };

      // Record structs for value semantics
      public readonly record struct Point(int X, int Y);
      ```

      ## Pattern Matching

      ```csharp
      // Switch expressions
      var area = shape switch {
          Circle c => Math.PI * c.Radius * c.Radius,
          Rectangle r => r.Width * r.Height,
          _ => 0
      };

      // Property patterns
      if (user is { IsActive: true, Role: "Admin" }) { ... }
      ```

      ## Async/Await

      ```csharp
      // Always use async/await for I/O
      public async Task<User> GetUserAsync(string id) {
          var data = await _httpClient.GetAsync($"/users/{id}");
          return await data.Content.ReadFromJsonAsync<User>();
      }

      // Use ConfigureAwait(false) in libraries
      await task.ConfigureAwait(false);
      ```

      ## Dependency Injection

      ```csharp
      // Constructor injection
      public class UserService {
          private readonly IUserRepository _repo;

          public UserService(IUserRepository repo) {
              _repo = repo;
          }
      }

      // Primary constructors (C# 12)
      public class UserService(IUserRepository repo) {
          public User? Find(string id) => repo.Find(id);
      }
      ```

      ## Collection Expressions (C# 12)

      ```csharp
      int[] numbers = [1, 2, 3];
      List<string> names = ["Alice", "Bob"];
      var combined = [..list1, ..list2];
      ```

      ## Avoid

      - `var` for unclear types
      - `async void` (except event handlers)
      - Throwing exceptions for control flow
      - Service locator pattern

      ## Testing

      ```csharp
      [Fact]
      public void UserCreation_SetsName() {
          var user = new User("1", "Test", "test@example.com");
          Assert.Equal("Test", user.Name);
      }
      ```
