version: 1.0.0
tags:
    - versioning
    - semver
    - release
author: ctxloom
description: Semantic versioning and release cycle management
notes: |
    Release workflow and versioning prompts for use with versionator tool.
installation: |
    ## Versionator Installation

    Download the latest release for your platform:
    ```bash
    # Linux (amd64)
    curl -LO https://github.com/babbitt/versionator/releases/latest/download/versionator-linux-amd64
    chmod +x versionator-linux-amd64
    sudo mv versionator-linux-amd64 /usr/local/bin/versionator

    # macOS (arm64)
    curl -LO https://github.com/babbitt/versionator/releases/latest/download/versionator-darwin-arm64
    chmod +x versionator-darwin-arm64
    sudo mv versionator-darwin-arm64 /usr/local/bin/versionator

    # Or via Go
    go install github.com/babbitt/versionator@latest
    ```

    Initialize in your project:
    ```bash
    versionator init
    ```
prompts:
    release:
        description: Release workflow for versionator projects
        tags:
            - versioning
            - release
            - workflow
        content: |-
            Release workflow for versionator. User MUST specify version.

            User input: $ARGUMENTS
            - Fixed version: "0.1.0", "1.0.0", "2.3.4"
            - Bump instruction: "patch", "minor", "major"

            If no version specified, STOP and ask the user. Do not guess.

            Steps:
            1. Parse user input for version or bump instruction
            2. Stage all changes: `git add -A`
            3. Analyze changes and create appropriate conventional commit message
            4. If bump instruction (patch/minor/major):
               - Commit with appropriate conventional prefix (fix:/feat:/feat!:)
               - Run `./versionator bump` to increment and amend
            5. If fixed version (X.Y.Z):
               - Write version to VERSION file
               - Commit with version in message
            6. Run `./versionator release push` to create tag, release branch, and push

            IMPORTANT: Never auto-select version. User must explicitly specify.
        content_hash: sha256:3d93b025e504ba73972d1ea7681a2ba51e777729acb22e365814ba49edbb45f3
