version: 1.0.0
tags:
    - versioning
    - semver
    - release
author: ctxloom
description: Semantic versioning and release cycle management
notes: |
    Release workflow and versioning prompts for use with versionator tool.
installation: |
    ## Versionator Installation

    Download the latest release for your platform:
    ```bash
    # Linux (amd64)
    curl -LO https://github.com/babbitt/versionator/releases/latest/download/versionator-linux-amd64
    chmod +x versionator-linux-amd64
    sudo mv versionator-linux-amd64 /usr/local/bin/versionator

    # macOS (arm64)
    curl -LO https://github.com/babbitt/versionator/releases/latest/download/versionator-darwin-arm64
    chmod +x versionator-darwin-arm64
    sudo mv versionator-darwin-arm64 /usr/local/bin/versionator

    # Or via Go
    go install github.com/babbitt/versionator@latest
    ```

    Initialize in your project:
    ```bash
    versionator init
    ```
prompts:
    release:
        description: Release workflow for versionator projects
        tags:
            - versioning
            - release
            - workflow
        content: |-
            Release workflow for versionator. User MUST specify version.

            User input: $ARGUMENTS
            - Fixed version: "0.1.0", "1.0.0", "2.3.4"
            - Bump instruction: "patch", "minor", "major"

            If no version specified, STOP and ask the user. Do not guess.

            Steps:
            1. Parse user input for version or bump instruction
            2. Stage all changes: `git add -A`
            3. Analyze changes and create appropriate conventional commit message
            4. If bump instruction (patch/minor/major):
               - Commit with appropriate conventional prefix (fix:/feat:/feat!:)
               - Run `./versionator bump` to increment and amend
            5. If fixed version (X.Y.Z):
               - Write version to VERSION file
               - Commit with version in message
            6. Run `./versionator release push` to create tag, release branch, and push

            IMPORTANT: Never auto-select version. User must explicitly specify.
        distilled: |-
            Versionator release (version REQUIRED):

            Input: $ARGUMENTS
            - Fixed: "0.1.0" → write VERSION, commit, release
            - Bump: "patch|minor|major" → commit, bump, release

            No version? STOP and ask.
        distilled_by: claude-code
    version-bump:
        description: Determine appropriate version bump
        tags:
            - versioning
            - semver
        content: |-
            Analyze these changes and recommend the appropriate semantic version bump:

            Current version: {{version}}

            Changes:
            {{changes}}

            Consider:
            - Are there breaking API changes? → major
            - New backward-compatible features? → minor
            - Bug fixes only? → patch
            - Is this pre-1.0? Different rules apply

            Recommend version and explain reasoning.
        distilled: |-
            Recommend version bump for:
            Version: {{version}}
            Changes: {{changes}}

            Major=breaking, Minor=features, Patch=fixes
        distilled_by: claude-code
    suggest-version:
        description: Display current version and suggest next version based on changes
        tags:
            - versioning
            - semver
            - analysis
        content: |-
            Analyze the repository and suggest the next semantic version.

            Steps:
            1. Read the current version from VERSION file
            2. Get changes since last tag using `git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD`
            3. Analyze the commit messages and code changes

            Display format:
            ```
            Current version: X.Y.Z
            Commits since last release: N

            Changes:
            - [list key changes]

            Suggested next version: X.Y.Z
            Reasoning: [explanation based on semver]
            ```

            Semver rules:
            - MAJOR (X): Breaking API changes, incompatible modifications
            - MINOR (Y): New backward-compatible features, significant enhancements
            - PATCH (Z): Bug fixes, minor improvements, documentation

            Pre-1.0 rules:
            - Breaking changes can be MINOR (0.X.0)
            - Features can be PATCH (0.0.X)

            Be conservative: when uncertain, suggest the lower bump level.
        distilled: |-
            Show current VERSION, list commits since last tag, suggest next semver.

            MAJOR=breaking, MINOR=features, PATCH=fixes
            Pre-1.0: breaking=minor, features=patch

            Conservative: uncertain → lower bump
        distilled_by: claude-code
