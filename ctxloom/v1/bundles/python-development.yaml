    uv:
        tags:
            - python
            - tooling
            - package-manager
        installation: |-
            pipx install uv (recommended)
            Or: curl -LsSf https://astral.sh/uv/install.sh | sh
        content: |-
            # UV Package Manager

            Fast Python package/project manager in Rust. Use as default for all Python projects.

            ## Project Mgmt

            ```bash
            uv init my-project && cd my-project
            uv add requests pytest
            uv add --dev pytest-cov ruff
            uv remove requests
            uv sync
            ```

            ## Venv

            ```bash
            uv venv                          # auto with uv sync
            source .venv/bin/activate        # Unix
            .venv\Scripts\activate           # Windows
            uv run python script.py          # run without activating
            ```

            ## Lockfile

            - `uv.lock`: auto-generated, commit it, cross-platform, exact versions

            ## pyproject.toml

            ```toml
            [project]
            name = "my-project"
            version = "0.1.0"
            requires-python = ">=3.11"
            dependencies = ["requests>=2.31"]

            [tool.uv]
            dev-dependencies = ["pytest>=8.0", "ruff>=0.4"]
            ```

            ## Common Commands

            ```bash
            uv sync                              # install from lockfile
            uv lock --upgrade                    # update all deps
            uv lock --upgrade-package requests   # update one
            uv tree                              # dep tree
            uv run --with requests script.py     # run w/ deps
            uv build                             # build package
            uv publish                           # publish to PyPI
            ```

            ## Python Versions

            ```bash
            uv python install 3.12
            uv python list
            uv python pin 3.12
            ```

            ## Migration from pip

            ```bash
            uv add -r requirements.txt
            uv export > requirements.txt
            ```

            ## Best Practices

            - Commit `uv.lock`
            - Prefer `uv run` over activating venv
            - Set `requires-python` in pyproject.toml
            - Use `uv sync` in CI/CD
