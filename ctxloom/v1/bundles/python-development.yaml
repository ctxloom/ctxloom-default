    python:
        tags:
            - python
            - language
        content: |-
            # Python Dev

            ## Env/Tools
            - Python 3 (version in pyproject.toml)
            - UV (pkg mgr), pytest, Gherkin (pytest-bdd/behave), ruff, structlog

            ## Test Structure
            - Unit: `test_*.py` (co-located)
            - Integration: `tests/integration/test_*.py`
            - Acceptance: `tests/acceptance/features/*.feature`

            ## Layout
            ```
            src/package_name/{log_messages,error_messages,module,test_module}.py
            tests/{integration,acceptance}/
            .devcontainer/, justfile, pyproject.toml
            ```

            ## Exclude Co-located Tests
            ```toml
            [tool.setuptools.packages.find]
            where = ["src"]
            exclude = ["**/test_*"]
            ```

            ## structlog
            ```python
            @dataclass(frozen=True)
            class LogMessages:
                USER_CREATED = "user_created"
            LOG_MSG = LogMessages()
            logger.info(LOG_MSG.USER_CREATED, username=username)
            ```

            ## Error Constants
            ```python
            @dataclass(frozen=True)
            class ErrorMessages:
                DIVIDE_BY_ZERO = "Cannot divide by zero"
            ERROR_MSG = ErrorMessages()
            raise ValueError(ERROR_MSG.DIVIDE_BY_ZERO)
            ```

            ## IoC
            ```python
            class UserService:
                def __init__(self, repo: UserRepository, logger: structlog.BoundLogger):
                    self._repo, self._logger = repo, logger
                @classmethod
                def create(cls, db: DatabaseConnection) -> "UserService":  # pragma: no cover
                    return cls(SQLUserRepository(db), structlog.get_logger())
            ```

            ## Type Hints - REQUIRED
            All code MUST have type annotations:
            - Function signatures: params AND return types
            - Class attributes and instance variables
            - Module-level variables

            ```python
            # REQUIRED - all signatures typed
            def process(data: list[str], limit: int = 10) -> dict[str, int]:
                results: dict[str, int] = {}
                return results

            class User:
                name: str
                age: int

                def __init__(self, name: str, age: int) -> None:
                    self.name = name
                    self.age = age
            ```

            Use `mypy --strict` or `pyright` for enforcement.

            ## Attribute Access
            - NO hardcoded string attr access: avoid `getattr(obj, "method")`, `globals()["x"]`, `operator.attrgetter("field")`
            - Defeats static analysis/refactoring
            - OK if string from runtime data; prefer explicit mappings

            ## getattr/hasattr - Let It Fail
            Do NOT use `getattr`/`hasattr` defensively without a recovery path:
            ```python
            # BAD - no recovery, just hiding bugs
            if hasattr(obj, "process"):
                obj.process()  # What if it doesn't exist? Silent failure.

            value = getattr(obj, "name", None)  # BAD if None isn't handled

            # BAD - catching AttributeError to ignore it
            try:
                obj.method()
            except AttributeError:
                pass

            # GOOD - let it fail, fix the type
            obj.process()  # AttributeError reveals the bug

            # OK - genuine recovery path
            if hasattr(plugin, "shutdown"):
                plugin.shutdown()  # Optional interface, skip if missing
            else:
                logger.info("Plugin has no shutdown hook")
            ```
            If there's no meaningful alternative action, let AttributeError propagate.

            ## Dicts vs Structured Types
            - NO dicts w/ known keys → use dataclass/NamedTuple
            ```python
            # BAD
            game_state = {"score": 0}
            # GOOD
            @dataclass
            class GameState:
                score: int = 0
            ```
            - Dicts OK for truly dynamic keys
            - Use TypedDict if dict syntax required

            ## Flow Control Anti-Patterns
            Avoid when values known at dev time:
            - `hasattr` branching → use Protocol/ABC/isinstance
            - Dict dispatch w/ hardcoded keys → match/case
            - String comparisons for state → use Enum

            Exception: OK at boundaries parsing external data; convert to typed values immediately:
            ```python
            def parse_status(raw: str) -> Status:
                match raw:
                    case "pending": return Status.PENDING
                    case _: raise ValueError(f"Unknown: {raw}")
            ```

            ## Strings as Flow Control - AVOID
            Never use string literals to control program flow internally:
            ```python
            # BAD - string-based dispatch
            if action == "create": do_create()
            elif action == "delete": do_delete()

            handlers = {"create": do_create, "delete": do_delete}
            handlers[action]()  # BAD if action is internal

            # GOOD - use Enum for internal state
            class Action(Enum):
                CREATE = auto()
                DELETE = auto()

            match action:
                case Action.CREATE: do_create()
                case Action.DELETE: do_delete()
            ```

            **Exception**: Dynamic dispatch for incoming external messages (API, events):
            ```python
            # OK - message_type comes from external source (API, queue, etc.)
            def handle_message(message_type: str, payload: dict):
                handlers = {
                    "user.created": handle_user_created,
                    "order.placed": handle_order_placed,
                }
                handler = handlers.get(message_type)
                if handler:
                    handler(payload)
            ```
            Convert to typed values at system boundaries when possible.
