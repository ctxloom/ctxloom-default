    human-review-checklist:
        tags:
            - review
            - security
            - quality
        content: |-
            # Human Review Checklist

            AI code is confidently incomplete. Correct happy path, dangerous elsewhere.

            ## Security (Never Skip)

            - [ ] Authentication/authorization correct
            - [ ] All inputs sanitized
            - [ ] Parameterized queries (no SQL injection)
            - [ ] Output encoding (no XSS)
            - [ ] No hardcoded secrets
            - [ ] Dependencies exist and are secure

            **Always review:** auth, payments, user data, admin functions.

            ## Hallucination Check

            ~20% of AI-suggested packages don't exist.

            - [ ] All imports exist: `npm info`, `pip show`, `cargo search`
            - [ ] API signatures are correct
            - [ ] Referenced endpoints exist

            ## Error Handling

            AI frequently omits:
            - [ ] Null checks
            - [ ] Early returns
            - [ ] Exception handling
            - [ ] Edge cases

            ## Test Integrity

            Watch for AI "fixing" tests by:
            - [ ] Deleting the test
            - [ ] Removing assertions
            - [ ] Mocking away actual behavior

            ```python
            # RED FLAG
            def test_user_creation():
                pass  # AI removed failing assertion
            ```

            ## Red Flags

            - Deleted code without explanation
            - Simplified error handling (catch-all replacing specific)
            - Removed validation
            - Changed async/sync without reason
            - New dependencies without justification

            ## Reject Immediately

            - Security vulnerabilities in sensitive code
            - Deleted tests without justification
            - Hallucinated dependencies
            - Race conditions in concurrent code
            - Missing error handling in critical paths
