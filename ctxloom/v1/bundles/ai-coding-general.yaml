    multi-step-workflow:
        tags:
            - workflow
            - process
        content: |-
            # Multi-Step Workflow

            ## Process

            1. **Outline** - Describe approach before writing code
            2. **Pseudocode** - Logic and function signatures, no implementation
            3. **Generate** - Implement in small, testable pieces
            4. **Integrate** - Wire up components, run full test suite

            ## Per-Stage Rules

            ### Stage 1: Outline
            Ask AI to describe components, data flow, edge cases before coding.
            Approve approach before proceeding.

            ### Stage 2: Pseudocode
            Request function signatures and error handling paths.
            No implementation code yet.

            ### Stage 3: Generate
            One function at a time with tests.
            Verify each piece works before next.

            ### Stage 4: Integrate
            Follow existing patterns in codebase.
            Run full test suite after integration.

            ## Task Sizing

            | Task Type | Approach |
            |-----------|----------|
            | One-line fix, boilerplate | Single-shot |
            | New features, architectural changes, multi-file | Multi-step |
            | Security-sensitive code | Multi-step, extra review |

            ## Iteration

            Treat first output as draft. Refine with follow-ups:
            ```
            That works but:
            1. Add error handling for timeouts
            2. Use project logging convention (slog)
            3. Add retry with exponential backoff
            ```

            ## Anti-Patterns

            - Generating entire system in one prompt
            - Skipping validation steps
            - Not reading AI explanations (reveals assumptions)
