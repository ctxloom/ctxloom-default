    version-specification:
        tags:
            - versioning
            - configuration
        content: |-
            # Version Specification

            AI defaults to older patterns. Always specify versions in CLAUDE.md.

            ## Template

            ```markdown
            # Versions

            ## Languages
            - Go: 1.22 (use range over integers, slog; NOT ioutil)
            - Node: 20.x (native fetch, no node-fetch)
            - Python: 3.12 (use dict/list not typing.Dict/List, f-strings not %)
            - Java: 21 (records, pattern matching, virtual threads; NOT Date/Calendar)
            - Rust: 1.75+ 2024 edition
            - Swift: 6.0 (strict concurrency, @Observable not ObservableObject)
            - TypeScript: 5.3+ (satisfies operator, const type params)

            ## Frameworks
            - React: 19 (Server Components, use() hook; NOT class components)
            - Next.js: 14 App Router (NOT Pages Router, getServerSideProps)
            - Spring Boot: 3.2 (constructor injection, virtual threads)
            ```

            ## DO / DO NOT Quick Reference

            | Language | DO | DO NOT |
            |----------|-----|--------|
            | Go | `io.ReadAll`, `slog` | `ioutil`, `log` |
            | Java | Records, `java.time` | POJOs, `Date`/`Calendar` |
            | Python | `dict`/`list` hints, f-strings | `typing.Dict`, `%` formatting |
            | Swift | `@Observable`, `NavigationStack` | `ObservableObject`, `NavigationView` |
            | React | Server Components, `use()` | Client-first, `useEffect` for data |

            ## Verification

            When AI suggests deprecated patterns:
            ```
            Your suggestion uses [old API]. This project uses [version] with [modern API].
            Regenerate using [modern API].
            ```
