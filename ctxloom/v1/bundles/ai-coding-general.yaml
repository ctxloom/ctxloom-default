fragments:
    concurrency-warnings:
        tags:
            - concurrency
            - safety
        content: |-
            # Concurrency Warnings

            AI makes 2x more concurrency errors than humans.

            ## Critical: Reintroduced Race Conditions

            AI may "optimize" sequential code back to parallel, reintroducing fixed bugs.

            ```javascript
            // SEQUENTIAL BY DESIGN - email needs user.id from save
            await saveUser(user);
            await sendEmail(user);

            // AI "improvement" reintroduces race condition:
            await Promise.all([saveUser(user), sendEmail(user)]);  // BUG
            ```

            **Protection:** Comment sequential code: `// SYNC-REQUIRED: [reason]`

            ## Common Mistakes by Language

            ### Go
            | Mistake | AI Pattern | Fix |
            |---------|------------|-----|
            | No shutdown | `go doWork()` | Use errgroup + context |
            | Channel overuse | Channels for state | Use mutex |
            | Missing context | No ctx parameter | Always pass context.Context |

            ### JavaScript/TypeScript
            | Mistake | AI Pattern | Fix |
            |---------|------------|-----|
            | Lost errors | Unhandled rejection | Handle or propagate |
            | Memory leaks | Listeners without cleanup | Remove in cleanup |

            ### Rust
            | Mistake | AI Pattern | Fix |
            |---------|------------|-----|
            | Blocking in async | `std::thread::sleep` | `tokio::time::sleep` |
            | Unnecessary Arc<Mutex> | Shared state default | Message passing |

            ## Review Checklist

            - [ ] Every goroutine/thread has shutdown path
            - [ ] Context cancellation propagated
            - [ ] Async errors handled
            - [ ] No blocking in async contexts
            - [ ] Lock order consistent
            - [ ] Sequential code not parallelized
            - [ ] No tests deleted/weakened
        content_hash: sha256:b35f8af858ac6e039afa7d2aaec0eae14c26fbecb7a4251b212df78a267540f3
