    puppeteer-mcp:
        tags:
            - mcp
            - browser
            - puppeteer
        content: |-
            # Puppeteer MCP (Alternative)

            Alternative browser automation using Puppeteer. Chromium-only.

            ## Config

            ```json
            {
              "mcpServers": {
                "puppeteer": {
                  "command": "npx",
                  "args": ["-y", "@modelcontextprotocol/server-puppeteer"]
                }
              }
            }
            ```

            ## Differences from Playwright

            - Chromium only (no Firefox/WebKit)
            - Uses CSS selectors (can be brittle)
            - Older, more established

            ## When to Use

            - Chromium-only projects
            - Existing Puppeteer infrastructure
            - Simpler requirements

            Prefer Playwright MCP for new projects.
