version: 1.0.0
tags:
    - mcp
    - browser
    - automation
    - testing
author: ctxloom
description: MCP browser automation with Playwright for web testing and interaction
notes: |
    Playwright MCP enables AI-driven browser automation using the accessibility tree
    rather than pixel-based approaches. Supports Chromium, Firefox, and WebKit.
fragments:
    playwright-mcp:
        tags:
            - mcp
            - browser
            - playwright
        content: |-
            # Playwright MCP

            Browser automation via Model Context Protocol. Uses accessibility tree for fast, deterministic control.

            ## Capabilities

            - Navigate to URLs
            - Click elements by text/role
            - Fill forms
            - Take screenshots
            - Extract page content
            - Execute JavaScript
            - Handle multiple tabs

            ## Why Accessibility Tree

            - Text-based, not pixel-based
            - No vision models needed
            - Faster and more reliable
            - Cross-browser (Chromium, Firefox, WebKit)

            ## Common Tasks

            ### Navigation
            "Navigate to https://example.com"
            "Go back to the previous page"
            "Open a new tab"

            ### Interaction
            "Click the Submit button"
            "Fill the email field with test@example.com"
            "Select 'Option 2' from the dropdown"

            ### Extraction
            "Get the text content of the main article"
            "List all links on the page"
            "Take a screenshot"

            ### Forms
            "Fill out the login form with username 'admin' and password 'test'"
            "Submit the form"

            ## Use Cases

            - E2E testing via natural language
            - Web scraping JavaScript-heavy sites
            - Frontend debugging
            - Automated form filling
            - Visual regression testing

            ## Best Practices

            - Be specific about element identification
            - Use visible text or ARIA labels for targeting
            - Wait for page loads implicitly
            - Close browsers when done
