  test-organization:
    tags:
      - testing
      - organization
      - colocation
      - patterns
    content: |-
      # Test Organization

      Tests belong next to the code they test — same directory, separate file. Not inline. Not in a parallel tree.

      ## The Principle

      ```
      src/
      ├── user_service.rs           # Production code only
      ├── user_service.test.rs      # Tests only
      └── mod.rs
      ```

      **The principle:** Tests belong near code.
      **The implementation:** Same directory, separate file, clearly named (`.test.rs`, `_test.go`).

      ## Why Separate Files (Not Inline)?

      AI context windows changed the calculus. Every token has cost.

      **Inline tests create noise:**
      - Search for business logic, get hits in test assertions
      - Ask AI to understand authentication, it loads 47 test cases it doesn't need
      - 500-line file where 300 lines are tests = 60% wasted context

      **Separate files enable:**
      - Selective loading — AI tools skip `.test` files
      - Clean production files — implementation without test noise
      - Faster codebase search — grep for logic, not assertions
      - Choice — humans wanting docs head *for* tests

      The problem isn't that tests exist. It's that inline tests are in the way.

      ## Why Not Parallel Trees?

      Java's `src/main`/`src/test` split was a workaround for JVM limitations:

      1. **No conditional compilation** — Java can't exclude code from JAR
      2. **Heavy test dependencies** — JUnit/Mockito add megabytes
      3. **Classpath-based loading** — only way to exclude was separate directories

      ```
      # Java's archaeological expedition to find tests
      src/main/java/com/example/UserService.java
      src/test/java/com/example/UserServiceTest.java
      ```

      That's not "next to the code." Modern languages solved this.

      ## Modern Solutions

      ### Rust: Conditional Compilation

      ```rust
      // correlation.rs — production code only
      pub struct Correlation { /* ... */ }

      // mod.rs
      pub mod correlation;

      #[cfg(test)]
      #[path = "correlation.test.rs"]
      mod correlation_tests;
      ```

      In release builds, test module doesn't exist — not compiled, not linked, not present.

      ### Go: Naming Convention

      ```
      mypackage/
      ├── user_service.go           # Production code
      └── user_service_test.go      # Test code
      ```

      `go build` skips `_test.go` files entirely. No annotations needed.

      ## What We Recommend

      ```
      src/
      ├── correlation.rs           # Production code
      ├── correlation.test.rs      # Tests
      └── mod.rs
      ```

      Benefits:
      - Tests adjacent to code (same directory)
      - Production files focused on implementation
      - Test files skippable when reading for understanding
      - Conditional compilation via `#[cfg(test)]`
      - Clean mutation testing workflow

      **Mutation testing benefit:** If a mutation survives, it's in `correlation.rs`; test file untouched. Revert production file, keep test improvements. With inline tests, reverting loses both.

      ## When Separation Makes Sense

      Some tests benefit from true separation:

      - **Integration tests** exercising multiple modules → `tests/` directory
      - **E2E tests** spinning up the whole system → separate test project
      - **Shared fixtures** → `src/test_utils/`, not a parallel tree

      The principle: don't separate without reason. Colocation is the default.

      ## The Tradeoffs

      **Lost with separate files:**
      - Visibility — inline tests impossible to miss
      - Encouragement — scroll down, see tests
      - Atomic versioning — change function and test in one commit

      **Gained:**
      - Cleaner production files
      - Efficient AI assistance
      - Faster codebase search
      - Flexible reading

      For AI-assisted development in 2026, the tradeoff favors separate files.

      ## Test Type by Location

      | Test Type | What It Tests | Where It Lives |
      |-----------|--------------|----------------|
      | Unit | Pure logic, no dependencies | Adjacent `.test` file |
      | BIT | Single implementation against interface | Adjacent `.test` file |
      | Integration | Multiple components interacting | `tests/` directory |
      | E2E | Full system behavior | Separate test project |

      **BIT** = Behavioral Interface Test. Tests that an implementation fulfills its interface's behavioral contract.

      ## This Won't Be Forever

      Every position emerged from tooling constraints. Java's parallel directories made sense when JVM couldn't exclude code. Inline tests made sense when file size didn't compete with AI context.

      When constraints change, optimal organization changes. What won't change: **tests belong near the code they test**. The definition of "near" adapts.
